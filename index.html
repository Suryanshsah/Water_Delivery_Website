<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Water Delivery</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

<header class="navbar">
  <div class="nav-left">
    <div class="logo">💧 AquaDrop</div>
    <div class="location">Delivering to <strong>Ajay Kumar Garg</strong></div>
  </div>

  <nav class="nav-center">
    <a href="index.html" class="active">Home</a>
    <a href="subscription.html">Subscription</a>
    <a href="track.html">Track</a>
    <a href="profile.html">Profile</a>
  </nav>

  <div class="nav-right">
    🔔 <div class="avatar">S</div>
  </div>
</header>

<section class="greeting">
  <p>Good Morning,</p>
  <h1>Suryansh</h1>
</section>

<section class="main">

  <div class="product-card">
    <span class="badge">Best Seller</span>
    <span class="rating">⭐ 4.8</span>

    <img src="water1.png" />

    <h2>Pure Mineral Water</h2>
    <p class="subtitle">20L Jar · 7-Step Purification</p>

    <div class="price-row">
      <div class="quantity">
        <button>-</button><span>1</span><button>+</button>
      </div>

      <div class="price">
        ₹30
        <small>ISI Certified</small>
      </div>
    </div>
  </div>

  <div class="side-panel">

    <div class="card">
      <div>
        <h3>Subscribe & Save</h3>
        <p>Get 15% off on daily orders</p>
      </div>
      <input type="checkbox" />
    </div>

    <div class="card">
      <h3>Delivery Slot</h3>
      <div class="slots">
        <button>07:00 AM</button>
        <button class="active">09:00 AM</button>
        <button>11:00 AM</button>
        <button>02:00 PM</button>
        <button>04:00 PM</button>
        <button>06:00 PM</button>
        <button>07:00 PM</button>
        <button>09:00 PM</button>
      </div>
    </div>

    <button class="book-btn" onclick="location.href='track.html'">
      Book Delivery · ₹30
    </button>

  </div>
</section>

</body>
</html>
